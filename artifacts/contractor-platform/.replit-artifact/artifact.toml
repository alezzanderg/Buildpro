kind = "web"
previewPath = "/"
title = "Contractor Estimate Platform"
version = "1.0.0"
id = "artifacts/contractor-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23247

[services.development]
run = "pnpm --filter @workspace/contractor-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contractor-platform", "run", "build" ]
publicDir = "artifacts/contractor-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23247"
BASE_PATH = "/"
